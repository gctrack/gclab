name: WCF History Batch Import

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Import 8 players
        run: |
          BATCH=16
          SUCCESS=0
          TOTAL_GAMES=0

          for i in $(seq 1 $BATCH); do
            echo ""
            echo "=== Player $i of $BATCH ==="

            NEXT=$(curl -s -X GET \
              "https://gclab.app/api/wcf-history-next" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

            echo "Next response: $NEXT"

            DONE=$(echo "$NEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('done', False))" 2>/dev/null || echo "False")

            if [ "$DONE" = "True" ]; then
              echo "All players imported — stopping."
              break
            fi

            PLAYER_ID=$(echo "$NEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['player']['id'])" 2>/dev/null || echo "")
            PLAYER_NAME=$(echo "$NEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); p=d['player']; print(p['wcf_first_name']+' '+p['wcf_last_name'])" 2>/dev/null || echo "Unknown")
            REMAINING=$(echo "$NEXT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('remaining', '?'))" 2>/dev/null || echo "?")

            echo "Importing: $PLAYER_NAME (remaining: $REMAINING)"

            if [ -z "$PLAYER_ID" ]; then
              echo "Could not get player ID — skipping"
              continue
            fi

            IMPORT_RESULT=$(curl -s -N -X POST \
              "https://gclab.app/api/wcf-history-import" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{\"wcf_player_id\": \"$PLAYER_ID\"}" \
              --max-time 300 | grep "data:" | tail -1)

            echo "Import result: $IMPORT_RESULT"

            GAMES=$(echo "$IMPORT_RESULT" | python3 -c "import sys,json; line=sys.stdin.read().strip().replace('data: ',''); d=json.loads(line); print(d.get('totalGames',0))" 2>/dev/null || echo "0")
            TOTAL_GAMES=$((TOTAL_GAMES + GAMES))
            SUCCESS=$((SUCCESS + 1))

            echo "Games imported: $GAMES"

            if [ $i -lt $BATCH ]; then
              echo "Waiting 15s before next player..."
              sleep 15
            fi
          done

          echo ""
          echo "=== Batch Summary ==="
          echo "Players processed: $SUCCESS"
          echo "Total games imported: $TOTAL_GAMES"