name: WCF Daily Sync

# NOTE 2026-03-14: WCF year pages (player.php?year=...) are down.
# Event detail fetching disabled in wcf-sync route until pages recover.
# Grade changes, new players, and ranking updates continue to sync normally.
# Affected players are flagged via needs_history_repull for backfill when WCF restores.
on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger WCF Sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "https://gclab.app/api/wcf-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
          echo "Sync triggered successfully"
